events {
    worker_connections 1024;
}

http {
    upstream goapp {
        server app1:8080 max_fails=3 fail_timeout=10s;
        server app2:8080 max_fails=3 fail_timeout=10s;
        server app3:8080 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;

        error_page 502 503 504 @unavailable;
        location @unavailable {
            default_type application/json;
            return 502 '{"status":"error","message":"Service unavailable"}\n';
        }

        location / {
            proxy_pass http://goapp;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 2s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;

            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }
    }
}